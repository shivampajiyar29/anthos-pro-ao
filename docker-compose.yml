version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: tp_clickhouse
    restart: always
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: tp_influxdb
    restart: always
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tp_api
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin_pass}@postgres:5432/${POSTGRES_DB:-trading_db}
      CLICKHOUSE_HOST: clickhouse
      REDIS_URL: redis://redis:6379/0
      INFLUXDB_URL: http://influxdb:8086
      SECRET_KEY: ${SECRET_KEY:-super_secret_key}

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tp_worker
    command: celery -A apps.api.worker worker --loglevel=info
    restart: always
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin_pass}@postgres:5432/${POSTGRES_DB:-trading_db}
      REDIS_URL: redis://redis:6379/0

  realtime:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tp_realtime
    command: uvicorn apps.api.realtime.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: tp_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8001
    depends_on:
      - api

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  influxdb_data:

networks:
  default:
    name: trading_network
